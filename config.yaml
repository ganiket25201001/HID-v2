# =============================================================================
# HID Shield - Production Configuration
# =============================================================================

# --- Application Metadata ---
app:
  name: "HID Shield"
  version: "1.0.0"
  description: "Intelligent USB Security System"
  window_width: 1280
  window_height: 800
  min_window_width: 960
  min_window_height: 640

# --- Security Policy Defaults ---
policy:
  # Action taken when an unknown HID device is plugged in.
  default_action: "prompt"

  # Entropy threshold (normalized 0.0–1.0 scale, maps to 0–8 bits).
  # 0.9 = 7.2 bits on the raw Shannon scale → SUSPICIOUS flag.
  entropy_threshold: 0.9

  # Keystroke rate thresholds (keystrokes per second).
  # Two-tier system: > 20 KPS = SUSPICIOUS, ≥ 80 KPS = MALICIOUS.
  max_keystroke_rate: 20
  malicious_keystroke_rate: 80

  cooldown_seconds: 30

  # Privacy-sensitive; keep false in production unless needed.
  log_keystrokes: false

  # PE signature detection (MZ header at offset 0)
  pe_signature_check: true

  # ML confidence threshold for MALICIOUS classification.
  ml_malicious_confidence_threshold: 0.85

# --- Database ---
database:
  path: "hid_shield.db"
  echo: false

# --- Logging ---
logging:
  level: "INFO"
  file: "hid_shield.log"
  rotation: "10 MB"
  retention: "30 days"

# --- UI / Theme ---
theme:
  bg_primary: "#0a0e17"
  bg_secondary: "#111827"
  bg_tertiary: "#1a1f2e"
  accent_cyan: "#00d4ff"
  accent_magenta: "#ff006e"
  accent_green: "#00ff88"
  accent_amber: "#ffb800"
  text_primary: "#e2e8f0"
  text_secondary: "#94a3b8"
  text_disabled: "#475569"
  border: "#1e293b"
  glow_cyan: "rgba(0,212,255,0.15)"
  glow_magenta: "rgba(255,0,110,0.15)"

  font_family: "Segoe UI"
  font_size_base: 14
