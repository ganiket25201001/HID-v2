app:
  name: HID Shield
  version: 1.0.0
  description: Intelligent USB Security System
  window_width: 1280
  window_height: 800
  min_window_width: 960
  min_window_height: 640
policy:
  default_action: prompt
  entropy_threshold: 0.9
  max_keystroke_rate: 20
  malicious_keystroke_rate: 80
  cooldown_seconds: 30
  log_keystrokes: true
  pe_signature_check: true
  ml_malicious_confidence_threshold: 0.85
# --- Windows Sandbox Isolation ---
windows_sandbox:
  enabled: true
  isolate_drive_letter_on_insert: true
  timeout_seconds: 240
  require_windows_sandbox: true
  keep_artifacts: false
  close_after_analysis: false
  host_staging_root: "C:/ProgramData/HIDShield/sandbox_bridge"

# --- AI Integration ---
ai_agent:
  enabled: true
  model: "gemma4:e2b"
database:
  path: hid_shield.db
  echo: false
logging:
  level: INFO
  file: hid_shield.log
  rotation: 10 MB
  retention: 30 days
theme:
  bg_primary: '#0a0e17'
  bg_secondary: '#111827'
  bg_tertiary: '#1a1f2e'
  accent_cyan: '#00d4ff'
  accent_magenta: '#ff006e'
  accent_green: '#00ff88'
  accent_amber: '#ffb800'
  text_primary: '#e2e8f0'
  text_secondary: '#94a3b8'
  text_disabled: '#475569'
  border: '#1e293b'
  glow_cyan: rgba(0,212,255,0.15)
  glow_magenta: rgba(255,0,110,0.15)
  font_family: Segoe UI
  font_size_base: 14
security:
  session_timeout_minutes: 15
notifications:
  sound_enabled: true
  toast_enabled: true
  min_severity: warning
