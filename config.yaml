# =============================================================================
# HID Shield - Production Configuration
# =============================================================================

# --- Application Metadata ---
app:
  name: "HID Shield"
  version: "1.0.0"
  description: "Intelligent USB Security System"
  window_width: 1280
  window_height: 800
  min_window_width: 960
  min_window_height: 640

# Keep this key for compatibility with modules that still read it.
# Production default is always real USB mode.
simulation_mode: false

# --- Security Policy Defaults ---
policy:
  # Action taken when an unknown HID device is plugged in.
  default_action: "prompt"

  # Threshold range: 0.0 - 1.0
  entropy_threshold: 0.65

  # Maximum keystrokes per second before flagging a device as suspicious.
  max_keystroke_rate: 80

  cooldown_seconds: 30

  # Privacy-sensitive; keep false in production unless needed.
  log_keystrokes: false

# --- Database ---
database:
  path: "hid_shield.db"
  echo: false

# --- Logging ---
logging:
  level: "INFO"
  file: "hid_shield.log"
  rotation: "10 MB"
  retention: "30 days"

# --- UI / Theme ---
theme:
  bg_primary: "#0a0e17"
  bg_secondary: "#111827"
  bg_tertiary: "#1a1f2e"
  accent_cyan: "#00d4ff"
  accent_magenta: "#ff006e"
  accent_green: "#00ff88"
  accent_amber: "#ffb800"
  text_primary: "#e2e8f0"
  text_secondary: "#94a3b8"
  text_disabled: "#475569"
  border: "#1e293b"
  glow_cyan: "rgba(0,212,255,0.15)"
  glow_magenta: "rgba(255,0,110,0.15)"

  font_family: "Segoe UI"
  font_size_base: 14
